<div class="container mt-3">
      <h2>Cadastro Produto</h2>
  <form class="row g-3">
    <div class="col-md-7 col-sm-12">
      <div class="form-floating mb-3">
  <input type="name" class="form-control" id="floatingInput" placeholder="Nome completo">
  <label for="floatingInput">Nome do Produto</label>
</div>
    </div>

   <div class="form-floating mt-3">
  <input type="number" step="0.5" class="form-control"floatingInput" placeholder="R$ Valor do produtos">
  <label for="floatingInput">Valor do produto</label>
</div>

<div class="form-floating mt-3">
  <input 
    type="number" 
    class="form-control" 
    id="quantidade" 
    name="quantidade_produto" 
    min="0" 
    placeholder="0" 
    required>
  <label for="quantidade">Quantidade em Estoque:</label>
</div>


    <div class="col-md-4 col-sm-12">
      <div class="form-floating">
        <select name="categoria" id="categoria"
        class="form-select" required>
        <option value=""selected disabled>Selecione</option>
        <option value="maquiagem">Maquiagem</option>
        <option value="skincare">Skincare</option>
         <option value="perfumaria">Perfumaria</option>
          <option value="cabelo">Cabelo</option>
      </select>
      <label for="categoria">Categoria</label>
    </div>
  </div>


  <div class="col-md-12 col-sm-12">
    <div class="form-check">
      <input type="checkbox" name="termos" id="termos" 
      class="form-check-input" required>
      <label for="termos" class="form-check-label">
        Confirmação
      </label>
    </div>
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-success">Concluir</button>
    <button type="reset" class="btn btn-warning">Limpar</button>
    <button type="button" class="btn btn-danger">Cancelar</button>

  </div>
  </form>
</div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
